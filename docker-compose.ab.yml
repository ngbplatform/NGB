name: ngb-ab

services:
  ngb.ab.postgres:
    container_name: ngb.ab.postgres
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
      args:
        POSTGRES_IMAGE_TAG: ${POSTGRES_IMAGE_TAG}
    image: ngb.ab.postgres:${POSTGRES_IMAGE_TAG}
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      APP_DB_NAME: ${AB_DB_NAME}
      APP_DB_USER: ${AB_DB_USER}
      APP_DB_PASSWORD: ${AB_DB_PASSWORD}
    volumes:
      - pg-ab-data:/var/lib/postgresql
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - ngb_ab_network

  ngb.ab.postgres.bootstrap:
    container_name: ngb.ab.postgres.bootstrap
    image: postgres:${POSTGRES_IMAGE_TAG}
    restart: "no"
    depends_on:
      ngb.ab.postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ngb.ab.postgres
      POSTGRES_PORT: "5432"
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      APP_DB_NAME: ${AB_DB_NAME}
      APP_DB_USER: ${AB_DB_USER}
      APP_DB_PASSWORD: ${AB_DB_PASSWORD}
    entrypoint: ["sh", "/bootstrap/bootstrap-application-databases.sh"]
    volumes:
      - ./docker/postgres/bootstrap-application-databases.sh:/bootstrap/bootstrap-application-databases.sh:ro
    networks:
      - ngb_ab_network

  ngb.ab.keycloak.init:
    container_name: ngb.ab.keycloak.init
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
      args:
        KEYCLOAK_VERSION: ${KEYCLOAK_IMAGE_TAG}
    image: ngb.ab.keycloak:${KEYCLOAK_IMAGE_TAG}
    restart: "no"
    depends_on:
      ngb.ab.postgres.bootstrap:
        condition: service_completed_successfully
    entrypoint: ["/opt/keycloak/bootstrap/import-realm.sh"]
    environment:
      KC_DB: postgres
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_MASTER_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_MASTER_ADMIN_PASSWORD}
      KC_DB_URL_HOST: ngb.ab.postgres
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_REALM_DISPLAY_NAME: ${KEYCLOAK_REALM_DISPLAY_NAME}
      KEYCLOAK_REALM_DISPLAY_NAME_HTML: ${KEYCLOAK_REALM_DISPLAY_NAME_HTML}
      KEYCLOAK_SSL_REQUIRED: ${KEYCLOAK_SSL_REQUIRED}
      KEYCLOAK_THEME_NAME: ${KEYCLOAK_THEME_NAME}
      KEYCLOAK_ACCESS_TOKEN_LIFESPAN_SECONDS: ${KEYCLOAK_ACCESS_TOKEN_LIFESPAN_SECONDS}
      KEYCLOAK_LOGIN_WITH_EMAIL_ALLOWED: ${KEYCLOAK_LOGIN_WITH_EMAIL_ALLOWED}
      KEYCLOAK_REGISTRATION_ALLOWED: ${KEYCLOAK_REGISTRATION_ALLOWED}
      KEYCLOAK_REGISTRATION_EMAIL_AS_USERNAME: ${KEYCLOAK_REGISTRATION_EMAIL_AS_USERNAME}
      KEYCLOAK_RESET_PASSWORD_ALLOWED: ${KEYCLOAK_RESET_PASSWORD_ALLOWED}
      KEYCLOAK_VERIFY_EMAIL: ${KEYCLOAK_VERIFY_EMAIL}
      KEYCLOAK_REMEMBER_ME: ${KEYCLOAK_REMEMBER_ME}
      KEYCLOAK_BRUTE_FORCE_PROTECTED: ${KEYCLOAK_BRUTE_FORCE_PROTECTED}
      KEYCLOAK_API_CLIENT_ID: ${KEYCLOAK_AB_API_CLIENT_ID}
      KEYCLOAK_WEB_CLIENT_ID: ${KEYCLOAK_AB_WEB_CLIENT_ID}
      KEYCLOAK_BACKGROUND_JOBS_CLIENT_ID: ${KEYCLOAK_AB_BACKGROUND_JOBS_CLIENT_ID}
      KEYCLOAK_WATCHDOG_CLIENT_ID: ${KEYCLOAK_AB_WATCHDOG_CLIENT_ID}
      KEYCLOAK_TESTER_CLIENT_ID: ${KEYCLOAK_TESTER_CLIENT_ID}
      KEYCLOAK_TESTER_CLIENT_SECRET: ${KEYCLOAK_TESTER_CLIENT_SECRET}
      WEB_HTTP_PORT: ${AB_WEB_HTTP_PORT}
      BACKGROUND_JOBS_HTTPS_PORT: ${AB_BACKGROUNDJOBS_HTTPS_PORT}
      WATCHDOG_HTTPS_PORT: ${AB_WATCHDOG_HTTPS_PORT}
      KEYCLOAK_DEMO_ADMIN_USERNAME: ${KEYCLOAK_DEMO_ADMIN_USERNAME}
      KEYCLOAK_DEMO_ADMIN_FIRST_NAME: ${KEYCLOAK_DEMO_ADMIN_FIRST_NAME}
      KEYCLOAK_DEMO_ADMIN_LAST_NAME: ${KEYCLOAK_DEMO_ADMIN_LAST_NAME}
      KEYCLOAK_DEMO_ADMIN_EMAIL: ${KEYCLOAK_DEMO_ADMIN_EMAIL}
      KEYCLOAK_DEMO_ADMIN_PASSWORD: ${KEYCLOAK_DEMO_ADMIN_PASSWORD}
    networks:
      - ngb_ab_network

  ngb.ab.keycloak:
    container_name: ngb.ab.keycloak
    build:
      context: .
      dockerfile: docker/keycloak/Dockerfile
      args:
        KEYCLOAK_VERSION: ${KEYCLOAK_IMAGE_TAG}
    image: ngb.ab.keycloak:${KEYCLOAK_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      ngb.ab.postgres:
        condition: service_healthy
      ngb.ab.keycloak.init:
        condition: service_completed_successfully
    command: ["start", "--optimized"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: ngb.ab.postgres
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_MASTER_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_MASTER_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
      KC_HTTP_MANAGEMENT_PORT: "9000"
      KC_LOG_LEVEL: ${KEYCLOAK_LOG_LEVEL}
    ports:
      - "127.0.0.1:${KEYCLOAK_HTTP_HOST_PORT}:8080"
    expose:
      - "9000"
    networks:
      - ngb_ab_network

  ngb.ab.seq:
    container_name: ngb.ab.seq
    image: datalust/seq:${SEQ_IMAGE_TAG}
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_APIKEY: ${SEQ_API_KEY}
      SEQ_FIRSTRUN_ADMINUSERNAME: ${SEQ_DEFAULT_ADMIN_NAME}
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_DEFAULT_ADMIN_PASSWORD}
    volumes:
      - seq-ab-data:/data
    ports:
      - "127.0.0.1:${SEQ_HTTP_HOST_PORT}:80"
    networks:
      - ngb_ab_network

  ngb.ab.migrator:
    container_name: ngb.ab.migrator
    build:
      context: .
      dockerfile: NGB.AgencyBilling.Migrator/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION}
    image: ngb.ab.migrator
    restart: "no"
    depends_on:
      ngb.ab.postgres.bootstrap:
        condition: service_completed_successfully
    environment:
      AB_DB_HOST: ngb.ab.postgres
      AB_DB_PORT: "5432"
      AB_DB_NAME: ${AB_DB_NAME}
      AB_DB_USER: ${AB_DB_USER}
      AB_DB_PASSWORD: ${AB_DB_PASSWORD}
      AB_DEMO_SEED_ENABLED: ${AB_DEMO_SEED_ENABLED}
      AB_DEMO_SEED: ${AB_DEMO_SEED}
      AB_DEMO_SEED_FROM: ${AB_DEMO_SEED_FROM}
      AB_DEMO_SEED_TO: ${AB_DEMO_SEED_TO}
      AB_DEMO_CLIENTS: ${AB_DEMO_CLIENTS}
      AB_DEMO_TEAM_MEMBERS: ${AB_DEMO_TEAM_MEMBERS}
      AB_DEMO_PROJECTS: ${AB_DEMO_PROJECTS}
      AB_DEMO_TIMESHEETS: ${AB_DEMO_TIMESHEETS}
      AB_DEMO_SALES_INVOICES: ${AB_DEMO_SALES_INVOICES}
      AB_DEMO_CUSTOMER_PAYMENTS: ${AB_DEMO_CUSTOMER_PAYMENTS}
    entrypoint: ["sh", "/bootstrap/seed-and-migrate.sh"]
    volumes:
      - ./docker/ab/migrator/seed-and-migrate.sh:/bootstrap/seed-and-migrate.sh:ro
    networks:
      - ngb_ab_network

  ngb.ab.api:
    container_name: ngb.ab.api
    image: ngb.ab.api
    build:
      context: .
      dockerfile: NGB.AgencyBilling.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AB_API_HTTP_PORT}:80"
      - "127.0.0.1:${AB_API_HTTPS_PORT}:443"
    depends_on:
      ngb.ab.seq:
        condition: service_started
      ngb.ab.keycloak:
        condition: service_started
      ngb.ab.migrator:
        condition: service_completed_successfully
    extra_hosts:
      - "${KEYCLOAK_PUBLIC_HOST}:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+;http://+
      ASPNETCORE_HTTPS_PORTS: "443"
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNET_CERT_PASS}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${ASPNET_CERT_PATH}
      ConnectionStrings__DefaultConnection: Host=ngb.ab.postgres;Port=5432;Database=${AB_DB_NAME};Username=${AB_DB_USER};Password=${AB_DB_PASSWORD}
      Serilog__WriteTo__1__Args__serverUrl: ${SEQ_URL}
      KeycloakSettings__Issuer: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
      KeycloakSettings__RequireHttpsMetadata: "false"
      ExternalLinksSettings__HealthUiUrl: https://localhost:${AB_WATCHDOG_HTTPS_PORT}/health-ui
      ExternalLinksSettings__BackgroundJobsUiUrl: https://localhost:${AB_BACKGROUNDJOBS_HTTPS_PORT}/hangfire
    volumes:
      - ${HOME}/.aspnet/https:/https/:ro
    networks:
      - ngb_ab_network

  ngb.ab.backgroundjobs:
    container_name: ngb.ab.backgroundjobs
    image: ngb.ab.backgroundjobs
    build:
      context: .
      dockerfile: NGB.AgencyBilling.BackgroundJobs/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AB_BACKGROUNDJOBS_HTTP_PORT}:80"
      - "127.0.0.1:${AB_BACKGROUNDJOBS_HTTPS_PORT}:443"
    depends_on:
      ngb.ab.seq:
        condition: service_started
      ngb.ab.keycloak:
        condition: service_started
      ngb.ab.migrator:
        condition: service_completed_successfully
    extra_hosts:
      - "${KEYCLOAK_PUBLIC_HOST}:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+;http://+
      ASPNETCORE_HTTPS_PORTS: "443"
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNET_CERT_PASS}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${ASPNET_CERT_PATH}
      ConnectionStrings__DefaultConnection: Host=ngb.ab.postgres;Port=5432;Database=${AB_DB_NAME};Username=${AB_DB_USER};Password=${AB_DB_PASSWORD}
      Serilog__WriteTo__1__Args__serverUrl: ${SEQ_URL}
      KeycloakSettings__Issuer: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
      KeycloakSettings__RequireHttpsMetadata: "false"
    volumes:
      - ${HOME}/.aspnet/https:/https/:ro
    networks:
      - ngb_ab_network

  ngb.ab.watchdog:
    container_name: ngb.ab.watchdog
    image: ngb.ab.watchdog
    build:
      context: .
      dockerfile: NGB.AgencyBilling.Watchdog/Dockerfile
      args:
        BUILD_CONFIGURATION: ${BUILD_CONFIGURATION}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AB_WATCHDOG_HTTP_PORT}:80"
      - "127.0.0.1:${AB_WATCHDOG_HTTPS_PORT}:443"
    depends_on:
      ngb.ab.seq:
        condition: service_started
      ngb.ab.keycloak:
        condition: service_started
      ngb.ab.migrator:
        condition: service_completed_successfully
      ngb.ab.api:
        condition: service_started
      ngb.ab.backgroundjobs:
        condition: service_started
      ngb.ab.web:
        condition: service_started
    extra_hosts:
      - "${KEYCLOAK_PUBLIC_HOST}:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+;http://+
      ASPNETCORE_HTTPS_PORTS: "443"
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNET_CERT_PASS}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${ASPNET_CERT_PATH}
      Serilog__WriteTo__1__Args__serverUrl: ${SEQ_URL}
      KeycloakSettings__Issuer: ${KEYCLOAK_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
      KeycloakSettings__RequireHttpsMetadata: "false"
      WebClient: http://ngb.ab.web:8080/
      HealthChecksUI__HealthChecks__0__Name: Agency Billing Watchdog
      HealthChecksUI__HealthChecks__0__Uri: https://ngb.ab.watchdog/health
      HealthChecksUI__HealthChecks__1__Name: Agency Billing API
      HealthChecksUI__HealthChecks__1__Uri: https://ngb.ab.api/health
      HealthChecksUI__HealthChecks__2__Name: Agency Billing Background Jobs
      HealthChecksUI__HealthChecks__2__Uri: https://ngb.ab.backgroundjobs/health
    volumes:
      - ${HOME}/.aspnet/https:/https/:ro
    networks:
      - ngb_ab_network

  ngb.ab.web:
    container_name: ngb.ab.web
    image: ngb.ab.web
    build:
      context: ./ui
      dockerfile: ngb-agency-billing-web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${AB_WEB_HTTP_PORT}:8080"
    depends_on:
      ngb.ab.api:
        condition: service_started
      ngb.ab.keycloak:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ""
      VITE_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL}
      VITE_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_AB_WEB_CLIENT_ID}
      VITE_KEYCLOAK_ROLE_ADMIN: ngb-admin
      VITE_KEYCLOAK_REDIRECT_URL: http://localhost:${AB_WEB_HTTP_PORT}/
      VITE_KEYCLOAK_POST_LOGOUT_REDIRECT_URL: http://localhost:${AB_WEB_HTTP_PORT}/
      VITE_BACKGROUND_JOB_URL: https://localhost:${AB_BACKGROUNDJOBS_HTTPS_PORT}/hangfire
      VITE_WATCHDOG_URL: https://localhost:${AB_WATCHDOG_HTTPS_PORT}/health-ui
    networks:
      - ngb_ab_network

  ngb.ab.pgadmin:
    container_name: ngb.ab.pgadmin
    image: dpage/pgadmin4:${PGADMIN_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      ngb.ab.postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "127.0.0.1:${PGADMIN_HTTP_HOST_PORT}:80"
    volumes:
      - pgadmin-ab-data:/var/lib/pgadmin
      - ./docker/ab/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - ngb_ab_network

volumes:
  pg-ab-data:
    name: pg-ab-data
  pgadmin-ab-data:
    name: pgadmin-ab-data
  seq-ab-data:
    name: seq-ab-data

networks:
  ngb_ab_network:
    name: ngb_ab_network
    driver: bridge
