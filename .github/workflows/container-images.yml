name: container-images

on:
  push:
    branches: [ main ]
    paths:
      - '.dockerignore'
      - '.github/workflows/container-images.yml'
      - 'Directory.Build.props'
      - 'NGB.*/**'
      - 'ui/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ngbplatform
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ngb-pm-api
            context: .
            dockerfile: ./NGB.PropertyManagement.Api/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-pm-backgroundjobs
            context: .
            dockerfile: ./NGB.PropertyManagement.BackgroundJobs/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-pm-watchdog
            context: .
            dockerfile: ./NGB.PropertyManagement.Watchdog/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-pm-migrator
            context: .
            dockerfile: ./NGB.PropertyManagement.Migrator/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-pm-web
            context: ./ui
            dockerfile: ./ui/ngb-property-management-web/Dockerfile
            build_args: ""
          - image: ngb-trade-api
            context: .
            dockerfile: ./NGB.Trade.Api/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-trade-backgroundjobs
            context: .
            dockerfile: ./NGB.Trade.BackgroundJobs/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-trade-watchdog
            context: .
            dockerfile: ./NGB.Trade.Watchdog/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-trade-migrator
            context: .
            dockerfile: ./NGB.Trade.Migrator/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-trade-web
            context: ./ui
            dockerfile: ./ui/ngb-trade-web/Dockerfile
            build_args: ""
          - image: ngb-ab-api
            context: .
            dockerfile: ./NGB.AgencyBilling.Api/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-ab-backgroundjobs
            context: .
            dockerfile: ./NGB.AgencyBilling.BackgroundJobs/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-ab-watchdog
            context: .
            dockerfile: ./NGB.AgencyBilling.Watchdog/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-ab-migrator
            context: .
            dockerfile: ./NGB.AgencyBilling.Migrator/Dockerfile
            build_args: |
              BUILD_CONFIGURATION=Release
          - image: ngb-ab-web
            context: ./ui
            dockerfile: ./ui/ngb-agency-billing-web/Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  propose-infra-deploy:
    name: propose infra deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      INFRA_REPOSITORY: ngbplatform/ngb-platform-infra
      NGB_SOURCE_SHA: ${{ github.sha }}
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Validate deploy PR credentials
        env:
          INFRA_PR_TOKEN: ${{ secrets.NGB_PLATFORM_INFRA_PR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${INFRA_PR_TOKEN}" ]; then
            echo "::error::Configure NGB_PLATFORM_INFRA_PR_TOKEN repository secret."
            exit 1
          fi

      - name: Checkout infra repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.INFRA_REPOSITORY }}
          token: ${{ secrets.NGB_PLATFORM_INFRA_PR_TOKEN }}
          path: ngb-platform-infra

      - name: Update platform workload image tags
        id: update
        working-directory: ngb-platform-infra
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          tag = os.environ["IMAGE_TAG"]
          workloads = ("pm", "trade", "ab")
          pattern = re.compile(r"(?m)^(\s*imageTag:\s*&imageTag\s+).+$")

          for workload in workloads:
              path = Path(f"apps/{workload}/envs/prod/values.yaml")
              text = path.read_text(encoding="utf-8")
              updated, count = pattern.subn(lambda match: match.group(1) + tag, text, count=1)
              if count != 1:
                  raise SystemExit(f"Could not update imageTag in {path}")
              path.write_text(updated, encoding="utf-8")
          PY

          if git diff --quiet -- apps/pm/envs/prod/values.yaml apps/trade/envs/prod/values.yaml apps/ab/envs/prod/values.yaml; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Open infra deploy PR
        if: steps.update.outputs.changed == 'true'
        working-directory: ngb-platform-infra
        env:
          GH_TOKEN: ${{ secrets.NGB_PLATFORM_INFRA_PR_TOKEN }}
        run: |
          set -euo pipefail

          branch="deploy/ngb-${NGB_SOURCE_SHA}"
          title="Deploy NGB ${IMAGE_TAG}"
          body="$(mktemp)"
          cat > "${body}" <<EOF
          Automated deployment proposal after a successful NGB container image build.

          Source repository: https://github.com/ngbplatform/NGB
          Source commit: ${NGB_SOURCE_SHA}
          Image tag: ${IMAGE_TAG}

          This PR updates PM, Trade, and AB production image tags in ngb-platform-infra.
          Merge it to let Argo CD deploy. PM/Trade/AB PreSync migrator hooks run before workload rollout.
          EOF

          git config user.name "ngb-deploy-bot"
          git config user.email "ngb-deploy-bot@users.noreply.github.com"
          git checkout -B "${branch}"
          git add apps/pm/envs/prod/values.yaml apps/trade/envs/prod/values.yaml apps/ab/envs/prod/values.yaml
          git commit -m "Deploy NGB ${IMAGE_TAG}"
          git push --force-with-lease origin "${branch}"

          pr_number="$(gh pr list --repo "${INFRA_REPOSITORY}" --head "${branch}" --json number --jq '.[0].number')"
          if [ -n "${pr_number}" ]; then
            gh pr edit "${pr_number}" --repo "${INFRA_REPOSITORY}" --title "${title}" --body-file "${body}"
          else
            gh pr create --repo "${INFRA_REPOSITORY}" --base main --head "${branch}" --title "${title}" --body-file "${body}"
          fi
